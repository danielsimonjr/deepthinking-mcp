version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "danielsimonjr"
    assignees:
      - "danielsimonjr"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    versioning-strategy: increase
    ignore:
      # TypeScript 7 is un-adoptable until the lint toolchain supports it:
      # @typescript-eslint/eslint-plugin@8.63.0 (latest) declares
      # `peer typescript: >=4.8.4 <6.1.0`, so `npm ci` fails with ERESOLVE.
      # Remove this ignore once @typescript-eslint ships TS 7 support.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "github-actions"
      - "automated"
