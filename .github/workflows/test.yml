name: Test Suite

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    name: Test on ${{ matrix.os }} (Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # Node 18 reached EOL 2026-04 and the test toolchain uses node:util
        # styleText (Node 20.12+ only), so the 18.x leg cannot pass.
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Run linter
        run: npm run lint

      - name: Run format check
        run: npm run format:check

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          # Exclude tests/unit/benchmarks/**: pure wall-clock Big-O/speedup
          # budget tests (e.g. "should maintain O(1) lookup complexity") that
          # measure shared-runner load, not correctness - flaky by
          # construction on CI. Same exclusion the project already applies
          # for `npm run test:publish` (see vitest.config.ts); required
          # status-check jobs must not depend on runner-load-sensitive
          # timing assertions.
          SKIP_BENCHMARKS: '1'

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: |
            coverage/
            test-results/
          retention-days: 30

  build:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Check package size
        run: |
          SIZE=$(du -sh dist | cut -f1)
          echo "Package size: $SIZE"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-build
          path: dist/
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v8
        with:
          path: test-results

      - name: Post test summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All test jobs have completed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check individual job logs for details." >> $GITHUB_STEP_SUMMARY
